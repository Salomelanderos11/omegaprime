<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGAPRIME</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <section>COMPILADOR OMEGAPRIME</section>
    <section>
    <div id="scanner" class="grid-container">
        <div class="grid-title">Scanner</div>
        
        <textarea id="codigo">programa EvaluacionProfunda <?
crear int base = 10;
crear int altura = 5;
crear int area = (base por altura) entre 2;
crear String inicio = "Calculando...";

mostrar(inicio);
mostrar(area);

si (area mayor 20) {
    mostrar("Area grande");
    crear int doble = area por 2;
    
    si (doble igual 50) {
        mostrar("El doble es 50");
    } sino {
        mostrar("Doble distinto de 50");
    }
} sino {
    mostrar("Area pequena");
    area = area mas 100;
}

crear int opCompleja = (base mas 5) por (altura menos 2) mas area;
mostrar(opCompleja);
?></textarea>
        
        <div id="tokens">
            <table>
                <thead>
                    <tr>
                        <th>Tipo de Token</th>
                        <th>Valor</th>
                        <th>Valor LF</th>
                    </tr>
                </thead>
                <tbody id="tokens-body"></tbody>
            </table>
        </div>

        <div id="btn-container">
            <button id="btn_scan">Ejecutar Scanner</button>
            <button id="btn_azul"  class= "btn_azul" >Perser</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-title">Panel de Control</div>
        
        <div class="full-width-content">
            <div>
                <h4 style="text-align: center; color: #7a81a8;">Tabla de Símbolos</h4>
                <table>
                    <thead>
                        <tr>
                            <th>Símbolo</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Dirección (Offset)</th> </tr>
                    </thead>
                    <tbody id="simbolos-body"></tbody> 
                </table>
            </div>

            <div style="margin-top: 20px;">
                <h4 style="text-align: center; color: #f76363;">Errores Semánticos</h4>
                <table>
                    <thead>
                        <tr>
                            <th>Error #</th>
                            <th>Descripción</th>
                        </tr>
                    </thead>
                    <tbody id="errores-semanticos-body"></tbody>
                </table>
            </div>
        </div>

        <div id="btn-container">
            <button id="btn_seman" class= "btn_azul">Ejecutar Semantico</button>
            
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-title">Código Intermedio (TAC)</div>
        
        <pre id="consola-salida" style="
    background: #ffffff; 
    color: #000000; 
    font-size: large;
    font-style: bold;
    padding: 15px; 
    border-radius: 5px; 
    overflow-y: auto; 
    max-height: 300px; 
    font-family: 'Courier New', Courier, monospace;
    grid-column: 1 / -1;
    width: 100%;
    box-sizing: border-box;
">  </pre>
        <div id="btn-container" style="margin-bottom: 10px;">
            <button id="btn_tac" class="btn_azul">Generar Código Intermedio</button>
        </div>
    </div>
    <div class="grid-container">
        <div class="grid-title">Errores Semánticos</div>
    </div>
</section>
</body>
<script type="module" src="index.js"></script>

</html>
